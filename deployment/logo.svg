<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none" role="img" aria-label="智讯雷达">
  <!-- 同心圆雷达表盘 -->
  <circle cx="24" cy="24" r="21" stroke="currentColor" stroke-width="2" opacity="0.9"/>
  <circle cx="24" cy="24" r="14" stroke="currentColor" stroke-width="2" opacity="0.55"/>
  <circle cx="24" cy="24" r="7" stroke="currentColor" stroke-width="2" opacity="0.35"/>
  <!-- 十字轴 -->
  <line x1="24" y1="3" x2="24" y2="10" stroke="currentColor" stroke-width="2" opacity="0.5"/>
  <line x1="24" y1="38" x2="24" y2="45" stroke="currentColor" stroke-width="2" opacity="0.5"/>
  <line x1="3" y1="24" x2="10" y2="24" stroke="currentColor" stroke-width="2" opacity="0.5"/>
  <line x1="38" y1="24" x2="45" y2="24" stroke="currentColor" stroke-width="2" opacity="0.5"/>
  <!-- 扫描半径线（东北象限） -->
  <line x1="24" y1="24" x2="39" y2="9" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  <!-- 东北象限光点 -->
  <circle cx="33" cy="15" r="3.2" fill="currentColor"/>
  <circle cx="33" cy="15" r="5.6" fill="currentColor" opacity="0.22"/>
</svg>
