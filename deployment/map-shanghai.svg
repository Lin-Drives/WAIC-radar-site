<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" fill="none" role="img" aria-label="上海三片区场馆分布示意图">
  <defs>
    <radialGradient id="pulse" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2450F0" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#2450F0" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 底图网格（克制留白） -->
  <g stroke="#E3E7EE" stroke-width="1">
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="640" x2="1200" y2="640"/>
    <line x1="240" y1="0" x2="240" y2="800"/>
    <line x1="480" y1="0" x2="480" y2="800"/>
    <line x1="720" y1="0" x2="720" y2="800"/>
    <line x1="960" y1="0" x2="960" y2="800"/>
  </g>

  <!-- 黄浦江简化曲线（贯穿东北-西南） -->
  <path d="M 1080 60 C 900 140, 980 260, 760 330 C 560 392, 640 520, 430 600 C 300 652, 260 720, 150 770"
        stroke="#0C1220" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.85"/>
  <path d="M 1096 84 C 920 160, 996 276, 780 348 C 580 410, 660 540, 452 620 C 322 672, 286 738, 182 786"
        stroke="#0C1220" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.3"/>

  <!-- 城市轮廓点（装饰） -->
  <g fill="#0C1220" opacity="0.18">
    <circle cx="360" cy="240" r="3"/><circle cx="430" cy="210" r="2.5"/>
    <circle cx="820" cy="480" r="3"/><circle cx="880" cy="450" r="2.5"/>
    <circle cx="560" cy="700" r="3"/><circle cx="240" cy="520" r="2.5"/>
  </g>

  <!-- 世博片区（浦东） -->
  <g>
    <circle cx="820" cy="300" r="34" fill="url(#pulse)"/>
    <circle cx="820" cy="300" r="9" fill="#2450F0"/>
    <circle cx="820" cy="300" r="16" stroke="#2450F0" stroke-width="2" fill="none" opacity="0.6"/>
    <text x="820" y="262" text-anchor="middle" font-family="monospace" font-size="22" font-weight="700" fill="#0C1220">世博</text>
    <text x="820" y="344" text-anchor="middle" font-family="monospace" font-size="15" fill="#455065">EXPO · 主展馆</text>
  </g>

  <!-- 张江片区（东南） -->
  <g>
    <circle cx="960" cy="560" r="34" fill="url(#pulse)"/>
    <circle cx="960" cy="560" r="9" fill="#2450F0"/>
    <circle cx="960" cy="560" r="16" stroke="#2450F0" stroke-width="2" fill="none" opacity="0.6"/>
    <text x="960" y="522" text-anchor="middle" font-family="monospace" font-size="22" font-weight="700" fill="#0C1220">张江</text>
    <text x="960" y="604" text-anchor="middle" font-family="monospace" font-size="15" fill="#455065">ZHANGJIANG</text>
  </g>

  <!-- 西岸片区（西南滨江） -->
  <g>
    <circle cx="340" cy="560" r="34" fill="url(#pulse)"/>
    <circle cx="340" cy="560" r="9" fill="#2450F0"/>
    <circle cx="340" cy="560" r="16" stroke="#2450F0" stroke-width="2" fill="none" opacity="0.6"/>
    <text x="340" y="522" text-anchor="middle" font-family="monospace" font-size="22" font-weight="700" fill="#0C1220">西岸</text>
    <text x="340" y="604" text-anchor="middle" font-family="monospace" font-size="15" fill="#455065">WEST BUND</text>
  </g>

  <!-- 图题 -->
  <text x="40" y="70" font-family="monospace" font-size="18" letter-spacing="4" fill="#8A94A6">SHANGHAI · THREE VENUE CLUSTERS</text>
</svg>
